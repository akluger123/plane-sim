<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D World Flight Sim</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.110/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #000; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ff00; font-family: 'Courier New', monospace; 
               background: rgba(0, 0, 0, 0.6); padding: 15px; border: 2px solid #00ff00; pointer-events: none; }
        .hint { font-size: 12px; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="hud">
        <div>AIRSPEED: <span id="speed">0</span> KNTS</div>
        <div>ALTITUDE: <span id="alt">0</span> FT</div>
        <div class="hint">W/S: Pitch | A/D: Roll | SHIFT: Throttle | CTRL: Brake</div>
    </div>

<script>
// THIS IS THE ONLY PART YOU NEED TO DO: 
// Get a free token at cesium.com/ion/ (No credit card needed)
// Replace 'YOUR_FREE_TOKEN' below with your key.
Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI3MDBkMDgxYi02OGIwLTQ3N2YtODFiZS1iYzNmNmFkYjBkMDUiLCJpZCI6NDI0MzM5LCJpYXQiOjE3NzczMDUyMDB9.eoxeeXQfJUQx2WM_deTUC2mt1V5G9l8oz1-kDzOpvdQ';

const viewer = new Cesium.Viewer('cesiumContainer', {
    terrainProvider: Cesium.createWorldTerrain(),
    animation: false, timeline: false, infoBox: false, selectionIndicator: false
});

// Load the 3D Buildings (Free OpenStreetMap dataset)
viewer.scene.primitives.add(Cesium.createOsmBuildings());

// Start camera in San Francisco
viewer.camera.setView({
    destination: Cesium.Cartesian3.fromDegrees(-122.4194, 37.7749, 1000),
    orientation: { heading: 0, pitch: 0, roll: 0 }
});

// Add the 3D Plane Model
const plane = viewer.entities.add({
    model: {
        uri: 'https://raw.githubusercontent.com/CesiumGS/cesium/main/Apps/SampleData/models/CesiumAir/Cesium_Air.glb',
        minimumPixelSize: 128
    }
});

// Flight Physics
let speed = 0;
const keys = {};
window.onkeydown = (e) => keys[e.code] = true;
window.onkeyup = (e) => keys[e.code] = false;

viewer.scene.preRender.addEventListener(() => {
    // Engine Control
    if (keys['ShiftLeft']) speed += 0.05;
    if (keys['ControlLeft']) speed = Math.max(0, speed - 0.05);
    
    // Flight Maneuvers
    if (keys['KeyW']) viewer.camera.lookUp(0.01);
    if (keys['KeyS']) viewer.camera.lookDown(0.01);
    if (keys['KeyA']) viewer.camera.lookLeft(0.02);
    if (keys['KeyD']) viewer.camera.lookRight(0.02);

    // Apply Movement
    viewer.camera.moveForward(speed);

    // Lock the Plane model to the nose of the camera
    const camera = viewer.camera;
    const forwardOffset = Cesium.Cartesian3.multiplyByScalar(camera.direction, 25, new Cesium.Cartesian3());
    const planePos = Cesium.Cartesian3.add(camera.position, forwardOffset, new Cesium.Cartesian3());
    
    plane.position = planePos;
    plane.orientation = Cesium.Transforms.headingPitchRollQuaternion(
        planePos, 
        new Cesium.HeadingPitchRoll(camera.heading, camera.pitch, camera.roll)
    );

    // Update HUD
    document.getElementById('speed').innerText = Math.floor(speed * 200);
    document.getElementById('alt').innerText = Math.floor(camera.positionCartographic.height * 3.28);
});
</script>
</body>
</html>
